// ─── DATE UTILS ───────────────────────────────────────────────────────────────

function getISOWeek(date) {
  const d = new Date(date); d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 4 - (d.getDay()||7));
  return Math.ceil(((d - new Date(d.getFullYear(),0,1))/86400000+1)/7);
}
function getWeekInfo(offset=0) {
  const base = new Date(); base.setDate(base.getDate()+offset*7);
  const dow = base.getDay();
  const mon = new Date(base); mon.setDate(base.getDate()-(dow===0?6:dow-1));
  const fri = new Date(mon); fri.setDate(mon.getDate()+4);
  const sat = new Date(mon); sat.setDate(mon.getDate()+5);
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  const wn = getISOWeek(mon);
  const fmt = d => d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
  return {
    key:`${mon.getFullYear()}-W${String(wn).padStart(2,"0")}`,
    rotIdx: wn%3,
    weekLabel:`${fmt(mon)} – ${fmt(fri)}`,
    weekendLabel:`${fmt(sat)} – ${fmt(sun)}`,
    weekNum: wn,
  };
}

// ─── STORAGE ──────────────────────────────────────────────────────────────────
// ─── SUPABASE STORAGE LAYER ───────────────────────────────────────────────────
const SB_CFG_KEY = 'pic-sb-config';
function getCfg() { try { return JSON.parse(localStorage.getItem(SB_CFG_KEY)); } catch { return null; } }
function saveCfg(url,key) { localStorage.setItem(SB_CFG_KEY, JSON.stringify({url,key})); }
let _sb = null;
function initSb(url,key) {
  _sb = window.supabase.createClient(url, key, {
    realtime: { params: { eventsPerSecond: 10 } }
  });
}
async function loadData() {
  if(!_sb) return null;
  try {
    const {data,error} = await _sb.from('board_state').select('data').eq('id',1).single();
    if(error) return null;
    return data?.data || null;
  } catch { return null; }
}
let _saveTimer = null;
let _skipNext = false;
function scheduleS(val) {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async () => {
    if(!_sb) return;
    _skipNext = true;
    await _sb.from('board_state').upsert({id:1, data:val, updated_at:new Date().toISOString()});
  }, 800);
}

// ─── RING CHART ───────────────────────────────────────────────────────────────
function RingChart({ pct, color, size=72, stroke=8 }) {
  const r = (size-stroke*2)/2;
  const circ = 2*Math.PI*r;
  const dash = circ*(pct/100);
  return (
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.15)" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.9)"
        strokeWidth={stroke} strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
        style={{transition:"stroke-dasharray 0.6s ease"}}/>
    </svg>
  );
}

// ─── MINI BAR ─────────────────────────────────────────────────────────────────

}

function TaskCard({ task, done, theme, swapOpts, locked, isCoverage, isReassigned, onToggle, onReassign, onReset, isCustom, isPriority, isUnavailable, onToggleUnavailable }) {
  return (

      borderLeft: `3px solid ${done ? "#10b981" : isUnavailable ? "#64748b" : isReassigned ? "#f59e0b" : isPriority ? "#fb923c" : theme.card}`,

      opacity: done ? 0.8 : 1,

          <div style={{fontSize:13,fontWeight:done?400:500,color:done?"#9ca3af":isUnavailable?"#94a3b8":"#1e293b",

            {task.text}
          </div>
          {task.note && (
            <div style={{fontSize:11,color:"#64748b",marginTop:4,background:"#f8fafc",
              borderRadius:5,padding:"3px 7px",lineHeight:1.4,display:"flex",gap:5}}>

            </div>
          )}
          <div style={{display:"flex",gap:4,marginTop:5,flexWrap:"wrap"}}>
            {isUnavailable && <span style={{fontSize:9,fontWeight:800,background:"rgba(100,116,139,0.15)",color:"#94a3b8",padding:"2px 6px",borderRadius:99,letterSpacing:"0.05em",border:"1px solid rgba(100,116,139,0.3)"}}>UNAVAILABLE</span>}
            {isReassigned && !isUnavailable && <span style={{fontSize:9,fontWeight:800,background:"#fef3c7",color:"#b45309",padding:"2px 6px",borderRadius:99,letterSpacing:"0.05em"}}>REASSIGNED</span>}
            {isCoverage && !isReassigned && <span style={{fontSize:9,fontWeight:800,background:"#fef3c7",color:"#b45309",padding:"2px 6px",borderRadius:99,letterSpacing:"0.05em"}}>PRIORITY</span>}
            {isPriority && <span style={{fontSize:9,fontWeight:800,background:"rgba(251,146,60,0.18)",color:"#fb923c",padding:"2px 8px",borderRadius:99,letterSpacing:"0.06em",border:"1px solid rgba(251,146,60,0.45)",display:"inline-flex",alignItems:"center",gap:3}}>⭐ PRIORITY</span>}
            {isCustom && <span style={{fontSize:9,fontWeight:800,background:"#f0fdf4",color:"#15803d",padding:"2px 6px",borderRadius:99,letterSpacing:"0.05em"}}>ADDED</span>}
          </div>
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0}}>
          {swapOpts.length>0 && (
            <button onClick={onReassign} style={{
              fontSize:10,padding:"3px 8px",borderRadius:6,
              background:theme.light,border:`1px solid ${theme.badge}`,
              color:theme.text,fontWeight:700,cursor:"pointer",
            }}>⇄ Swap</button>
          )}
          {isReassigned && !isUnavailable && (
            <button onClick={onReset} style={{
              fontSize:10,padding:"3px 8px",borderRadius:6,
              background:"#fee2e2",border:"1px solid #fca5a5",
              color:"#dc2626",fontWeight:700,cursor:"pointer",
            }}>↩ Reset</button>
          )}
          <button onClick={onToggleUnavailable} style={{
            fontSize:10,padding:"3px 8px",borderRadius:6,

}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("w3");

  const [weekOffset, setWeekOffset] = useState(0);
  const [checked, setChecked] = useState({});
  const [unavailable, setUnavailable] = useState({});
  const [swapped, setSwapped] = useState({});
  const [absentPic, setAbsentPic] = useState(PICS[1]);
  const [wknd, setWknd] = useState({count:1,p1:PICS[0],p2:PICS[1]});
  const [customTasks, setCustomTasks] = useState([]);
  const [wdCustomTasks, setWdCustomTasks] = useState([]);
  const [customNames, setCustomNames] = useState({});
  const [customDates, setCustomDates] = useState({});
  const [addInput, setAddInput] = useState("");
  const [addPic, setAddPic] = useState(PICS[0]);
  const [modal, setModal] = useState(null);
  const [locked, setLocked] = useState(true);
  const [pinModal, setPinModal] = useState(null);
  const [pinInput, setPinInput] = useState("");
  const [pinError, setPinError] = useState("");
  const [pin, setPin] = useState("1234");
  const [editingName, setEditingName] = useState(null);
  const [editingDate, setEditingDate] = useState(null);
  const [nameInput, setNameInput] = useState("");
  const [dateInput, setDateInput] = useState("");
  const [periodicReports, setMonthlyReports] = useState(
    Object.fromEntries(PERIODIC_REPORTS.map(r=>[r.id,{done:false,completedBy:"",notAvailable:false}]))
  );
  const [history, setHistory] = useState([]);
  const [historyDay, setHistoryDay] = useState(null);
  const [lastDate, setLastDate] = useState("");
  const [ready, setReady] = useState(false);
  const [sbReady, setSbReady] = useState(false);
  const [setupMode, setSetupMode] = useState(false);
  const [sbUrl, setSbUrl] = useState('');
  const [sbKey, setSbKey] = useState('');
  const [sbError, setSbError] = useState('');
  const [sbTesting, setSbTesting] = useState(false);
  const [syncStatus, setSyncStatus] = useState('connecting'); // connecting | live | error

  const wi = getWeekInfo(weekOffset);

  function applyData(d) {
    if(!d) return;
    setChecked(d.checked||{}); setUnavailable(d.unavailable||{}); setSwapped(d.swapped||{});
    setAbsentPic(d.absentPic||PICS[1]); setWknd(d.wknd||{count:1,p1:PICS[0],p2:PICS[1]});
    setCustomTasks(d.customTasks||[]); setWdCustomTasks(d.wdCustomTasks||[]);
    setCustomNames(d.customNames||{}); setCustomDates(d.customDates||{});
    if(d.pin) setPin(d.pin);
    if(d.periodicReports) setMonthlyReports(d.periodicReports);
    if(d.history) setHistory(d.history);
    if(d.lastDate) setLastDate(d.lastDate);
  }

  useEffect(() => {
    const cfg = getCfg();
    if(!cfg) { setSetupMode(true); setReady(true); return; }
    initSb(cfg.url, cfg.key);
    loadData().then(d => {
      applyData(d);
      setReady(true);
      setSbReady(true);
      setSyncStatus('live');
    }).catch(() => { setReady(true); setSyncStatus('error'); });
  },[]);

  // Real-time subscription
  useEffect(() => {
    if(!sbReady||!_sb) return;
    const channel = _sb.channel('board_realtime')
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'board_state'},
        (payload) => {
          if(_skipNext) { _skipNext=false; return; }
          applyData(payload.new?.data);
        })
      .subscribe((status) => {
        setSyncStatus(status==='SUBSCRIBED'?'live':'connecting');
      });
    return () => _sb.removeChannel(channel);
  },[sbReady]);

  useEffect(() => {
    if(!ready||!sbReady) return;
    scheduleS({checked,swapped,unavailable,absentPic,wknd,customTasks,wdCustomTasks,customNames,customDates,pin,history,lastDate,periodicReports});
  },[checked,swapped,unavailable,absentPic,wknd,customTasks,wdCustomTasks,customNames,customDates,pin,history,lastDate,periodicReports,ready,sbReady]);

  // ─── Helpers ───────────────────────────────────────────────────────────────
  const ck = s=>`${wi.key}-${s}`;
  const activeCK = tab==="w3"?ck("w3"):tab==="w2"?ck("w2"):ck("wknd");
  const isChecked = id=>!!(checked[activeCK]?.[id]);
  const toggle = id=>setChecked(p=>({...p,[activeCK]:{...(p[activeCK]||{}),[id]:!p[activeCK]?.[id]}}));
  const getSwap = id=>swapped[activeCK]?.[id]||null;
  const isUnavailable = id=>!!(unavailable[activeCK]?.[id]);
  const toggleUnavailable = id=>setUnavailable(p=>({...p,[activeCK]:{...(p[activeCK]||{}),[id]:!p[activeCK]?.[id]}}));
  const doSwap = (id,to)=>{setSwapped(p=>({...p,[activeCK]:{...(p[activeCK]||{}),[id]:to}}));setModal(null);};
  const resetSwap = id=>setSwapped(p=>{const c={...p,[activeCK]:{...(p[activeCK]||{})}};delete c[activeCK][id];return c;});

  const canEditMeta = tab==="w2"||tab==="wknd";
  const nameKey=(t,pic)=>`${t}|${pic}`;
  const getDisplayName=pic=>customNames[nameKey(tab,pic)]||pic;
  const getDisplayDate=()=>customDates[tab]||(tab==="wknd"?wi.weekendLabel:wi.weekLabel);

  function commitName(key,val){setCustomNames(p=>({...p,[key]:val.trim()||key.split("|")[1]}));setEditingName(null);}
  function commitDate(tk,val){setCustomDates(p=>({...p,[tk]:val.trim()}));setEditingDate(null);}

  // ─── Daily snapshot & auto-reset ──────────────────────────────────────────
  const todayStr = () => new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"});
  const todayKey = () => new Date().toISOString().slice(0,10);

  function takeSnapshot(currentChecked, currentCols, currentPicList) {
    const label = todayStr();
    const key   = todayKey();
    const perPic = currentPicList.map(pic => {
      const tasks = currentCols[pic]?.tasks || [];
      const done  = tasks.filter(t => !!(currentChecked[`${wi.key}-w3`]?.[t.id] || currentChecked[`${wi.key}-w2`]?.[t.id] || currentChecked[`${wi.key}-wknd`]?.[t.id])).length;
      const taskList = tasks.map(t => ({
        text: t.text,
        done: !!(currentChecked[`${wi.key}-w3`]?.[t.id] || currentChecked[`${wi.key}-w2`]?.[t.id] || currentChecked[`${wi.key}-wknd`]?.[t.id]),
      }));
      return { pic, done, total: tasks.length, tasks: taskList };
    });
    return { key, label, perPic };
  }

  // Check every minute if the date has rolled over → snapshot + reset
  useEffect(() => {
    if (!ready) return;
    const check = () => {
      const today = todayKey();
      if (lastDate && lastDate !== today) {
        // Take snapshot of yesterday before resetting
        const snap = takeSnapshot(checked, cols, picList);
        setHistory(prev => {
          const without = prev.filter(h => h.key !== snap.key);
          return [snap, ...without].slice(0, 60); // keep 60 days
        });
        // Clear today's checkmarks
        setChecked({});
        setUnavailable({});
        setLastDate(today);
      } else if (!lastDate) {
        setLastDate(today);
      }
    };
    check();
    const t = setInterval(check, 60000);
    return () => clearInterval(t);
  }, [ready, lastDate, checked]);

  // ─── Column builders ───────────────────────────────────────────────────────
  const build3=()=>{
    const rot=ROTATION[wi.rotIdx];
    const cols=Object.fromEntries(PICS.map(p=>[p,{tasks:[]}]));
    PICS.forEach(pic=>{
      (TASK_GROUPS[rot[pic]]||[]).forEach(task=>{
        const to=getSwap(task.id)||pic; cols[to].tasks.push({...task,origPic:pic});
      });
      // Add shared tasks to every PIC
      SHARED_TASKS.forEach(task=>{
        const to=getSwap(task.id+pic)||pic;
        cols[to].tasks.push({...task,id:task.id+pic,origPic:pic,isShared:true});
      });
    });
    wdCustomTasks.forEach(task=>{const to=getSwap(task.id)||task.pic;if(cols[to])cols[to].tasks.push({...task,origPic:task.pic,isCustom:true});});
    return cols;
  };
  // Admin task IDs — always stay together with one PIC on 2-PIC tab
  const ADMIN_IDS = new Set(["cl1","cl2","cl3","cl4"]);

  const build2=()=>{
    const rot=ROTATION[wi.rotIdx];
    const present=PICS.filter(p=>p!==absentPic);
    const cols=Object.fromEntries(present.map(p=>[p,{tasks:[]}]));
    // Collect ALL tasks from all 3 PICs then split evenly between the 2 present
    const allTasks=[];
    PICS.forEach(pic=>(TASK_GROUPS[rot[pic]]||[]).forEach(task=>{
      allTasks.push({...task,origPic:pic,coverage:pic===absentPic});
    }));
    // Distribute evenly: alternate between present PICs
    allTasks.forEach((task,i)=>{
      const ov=getSwap(task.id);
      const to=ov&&present.includes(ov)?ov:present[i%2];
      cols[to].tasks.push(task);
    });
    // Add shared tasks to each present PIC
    present.forEach(pic=>{
      SHARED_TASKS.forEach(task=>{
        const to=getSwap(task.id+pic)||pic;
        if(cols[to]) cols[to].tasks.push({...task,id:task.id+pic,origPic:pic,isShared:true});
      });
    });
    // Add custom weekday tasks
    wdCustomTasks.forEach(task=>{
      const ov=getSwap(task.id);const def=present.includes(task.pic)?task.pic:present[0];
      const to=ov&&present.includes(ov)?ov:def;
      if(cols[to])cols[to].tasks.push({...task,origPic:task.pic,isCustom:true});
    });
    return cols;
  };
  const buildWknd=()=>{
    const all=[...WEEKEND_BASE,...customTasks];
    if(wknd.count===1)return{[wknd.p1]:{tasks:all}};
    const cols={[wknd.p1]:{tasks:[]},[wknd.p2]:{tasks:[]}};
    all.forEach((task,idx)=>{
      const ov=getSwap(task.id);
      const to=ov===wknd.p1||ov===wknd.p2?ov:idx%2===0?wknd.p1:wknd.p2;
      cols[to].tasks.push(task);
    });
    // Add shared tasks to each weekend PIC
    const wkndPics=wknd.count===1?[wknd.p1]:[wknd.p1,wknd.p2];
    wkndPics.forEach(pic=>{
      if(cols[pic]) SHARED_TASKS.forEach(task=>{
        cols[pic].tasks.push({...task,id:task.id+pic,origPic:pic,isShared:true,priority:true});
      });
    });
    return cols;
  };

    const done=tasks.filter(t=>isChecked(t.id)).length;
    return {pic,total:tasks.length,done,pct:tasks.length?Math.round(done/tasks.length*100):0};
  });

          {tab==="wknd"&&(
            <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:"10px 16px",display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
              <span style={{fontSize:12,fontWeight:700,color:"#94a3b8"}}>Weekend PICs:</span>
              {[1,2].map(n=>(
                <label key={n} style={{display:"flex",alignItems:"center",gap:6,fontSize:12,fontWeight:wknd.count===n?700:400,color:wknd.count===n?"#a5b4fc":"#64748b",cursor:"pointer"}}>
                  <input type="radio" checked={wknd.count===n} onChange={()=>setWknd(w=>({...w,count:n}))} style={{accentColor:"#6366f1"}}/>{n} PIC{n===2?"s":""}

              <select value={wknd.p1} onChange={e=>setWknd(w=>({...w,p1:e.target.value}))} style={{padding:"4px 8px",borderRadius:6,border:"1px solid rgba(255,255,255,0.1)",background:"#1e293b",color:"#f8fafc",fontSize:12}}>

              {wknd.count===2&&(<>

                <select value={wknd.p2} onChange={e=>setWknd(w=>({...w,p2:e.target.value}))} style={{padding:"4px 8px",borderRadius:6,border:"1px solid rgba(255,255,255,0.1)",background:"#1e293b",color:"#f8fafc",fontSize:12}}>
                  {PICS.filter(p=>p!==wknd.p1).map(p=><option key={p} value={p}>{p}</option>)}

      {/* ════════════════════════════════════════════════════════════════════
          DASHBOARD VIEW
      ════════════════════════════════════════════════════════════════════ */}
      {view==="dash"&&(
        <div style={{maxWidth:1440,margin:"0 auto",padding:"24px 20px 48px"}}>

                        onChange={e=>setMonthlyReports(p=>({...p,[report.id]:{...p[report.id],completedBy:e.target.value,done:e.target.value!==""?true:p[report.id].done}}))}
                        style={{padding:"6px 10px",borderRadius:8,border:"1px solid rgba(255,255,255,0.1)",background:"#1e293b",color:state.completedBy?"#a5b4fc":"#475569",fontSize:12,fontWeight:600,cursor:state.notAvailable?"not-allowed":"pointer",opacity:state.notAvailable?0.4:1}}>
                        <option value="">Who completed this?</option>
                        {PICS.map(p=><option key={p} value={p}>{p}</option>)}
                      </select>

                      {/* Not Available toggle */}
                      <button
                        onClick={()=>setMonthlyReports(p=>({...p,[report.id]:{done:false,completedBy:"",notAvailable:!state.notAvailable}}))}
                        style={{padding:"6px 12px",borderRadius:8,border:`1px solid ${state.notAvailable?"rgba(100,116,139,0.5)":"rgba(255,255,255,0.08)"}`,background:state.notAvailable?"rgba(100,116,139,0.2)":"rgba(255,255,255,0.04)",color:state.notAvailable?"#94a3b8":"#475569",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>
                        {state.notAvailable?"↩ Restore":"Not Available"}
                      </button>

                      {/* Reset button */}
                      {(state.done||state.completedBy)&&!state.notAvailable&&(
                        <button onClick={()=>setMonthlyReports(p=>({...p,[report.id]:{done:false,completedBy:"",notAvailable:false}}))}
                          style={{padding:"6px 10px",borderRadius:8,border:"1px solid rgba(239,68,68,0.3)",background:"rgba(239,68,68,0.08)",color:"#f87171",fontSize:11,fontWeight:700}}>
                          Reset
                        </button>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* ══ ADD TASKS ═══════════════════════════════════════════════════════ */}
      {view==="board"&&(
        <div style={{maxWidth:1440,margin:"0 auto",padding:"0 20px 52px"}}>
          <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,padding:18}}>
            <div style={{fontSize:12,fontWeight:800,color:"#475569",letterSpacing:"0.08em",marginBottom:12}}>➕ Add Task</div>
            {(tab==="wknd"?customTasks:wdCustomTasks).map(t=>(
              <div key={t.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 10px",background:"rgba(255,255,255,0.04)",borderRadius:8,border:"1px solid rgba(255,255,255,0.06)",marginBottom:5}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:12,color:"#94a3b8"}}>{t.text}</span>
                  {t.pic&&<span style={{fontSize:9,fontWeight:700,color:"#818cf8",background:"rgba(99,102,241,0.15)",padding:"2px 7px",borderRadius:99}}>→ {t.pic} · PIC {PICS.indexOf(t.pic)+1}</span>}
                </div>
                <button onClick={()=>tab==="wknd"?setCustomTasks(p=>p.filter(x=>x.id!==t.id)):setWdCustomTasks(p=>p.filter(x=>x.id!==t.id))}
                  style={{background:"none",border:"none",color:"#ef4444",fontSize:18,lineHeight:1,padding:"0 4px"}}>×</button>
              </div>
            ))}
            <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap"}}>
              {tab!=="wknd"&&(
                <select value={addPic} onChange={e=>setAddPic(e.target.value)}
                  style={{padding:"9px 10px",borderRadius:8,border:"1px solid rgba(255,255,255,0.1)",background:"#1e293b",color:"#f8fafc",fontSize:12,fontWeight:600,minWidth:160}}>
                  {(tab==="w2"?PICS.filter(p=>p!==absentPic):PICS).map(p=>(
                    <option key={p} value={p}>{p} — PIC {PICS.indexOf(p)+1}</option>
                  ))}
                </select>
              )}
              <input value={addInput} onChange={e=>setAddInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTask()}
                placeholder="Type a task and press Enter…"
                style={{flex:1,minWidth:200,padding:"9px 14px",borderRadius:8,border:"1px solid rgba(255,255,255,0.1)",background:"#1e293b",color:"#f8fafc",fontSize:12}}/>
              <button onClick={addTask} style={{padding:"9px 20px",borderRadius:8,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",border:"none",fontWeight:800,fontSize:12,boxShadow:"0 2px 10px rgba(99,102,241,0.35)"}}>
                Add Task
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ══ REASSIGN MODAL ══════════════════════════════════════════════════ */}
      {modal&&(
        <div onClick={()=>setModal(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,backdropFilter:"blur(6px)"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#1e293b",borderRadius:20,padding:28,width:360,boxShadow:"0 32px 80px rgba(0,0,0,0.6)",border:"1px solid rgba(255,255,255,0.1)"}}>
            <div style={{fontWeight:900,fontSize:18,color:"#f8fafc",marginBottom:8}}>Reassign Task</div>
            <div style={{fontSize:12,color:"#94a3b8",lineHeight:1.5,background:"rgba(255,255,255,0.04)",borderRadius:9,padding:"10px 13px",marginBottom:22,fontStyle:"italic",borderLeft:"3px solid #6366f1"}}>
              "{modal.taskText}"
            </div>
            <div style={{fontSize:10,fontWeight:800,color:"#475569",letterSpacing:"0.1em",marginBottom:12}}>MOVE TO</div>
            {modal.opts.map(p=>{
              const th=THEMES[PICS.indexOf(p)%3];
              return(
                <button key={p} onClick={()=>doSwap(modal.taskId,p)} style={{display:"flex",alignItems:"center",gap:13,width:"100%",marginBottom:9,padding:"13px 16px",borderRadius:12,background:`${th.card}15`,border:`1px solid ${th.card}33`,cursor:"pointer"}}>
                  <div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg,${th.card},${th.dark})`,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:16}}>
                    {p.charAt(0)}
                  </div>
                  <div style={{textAlign:"left"}}>
                    <div style={{fontSize:14,fontWeight:700,color:"#f8fafc"}}>{p}</div>
                    <div style={{fontSize:10,color:th.card,fontWeight:600}}>PIC {PICS.indexOf(p)+1}</div>
                  </div>
                </button>
              );
            })}
            <button onClick={()=>setModal(null)} style={{display:"block",width:"100%",marginTop:6,padding:"11px",borderRadius:12,background:"transparent",border:"1px solid rgba(255,255,255,0.08)",color:"#475569",fontSize:13,fontWeight:600,cursor:"pointer"}}>Cancel</button>
          </div>
        </div>
      )}

      {/* ══ PIN MODAL ═══════════════════════════════════════════════════════ */}
      {pinModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,backdropFilter:"blur(8px)"}}>
          <div style={{background:"#1e293b",borderRadius:22,padding:34,width:340,boxShadow:"0 32px 80px rgba(0,0,0,0.6)",textAlign:"center",border:"1px solid rgba(255,255,255,0.08)"}}>
            <div style={{fontSize:40,marginBottom:14}}>{pinModal==="unlock"?"🔐":"⚙️"}</div>
            <div style={{fontWeight:900,fontSize:20,color:"#f8fafc",marginBottom:6}}>{pinModal==="unlock"?"Manager PIN":"Set New PIN"}</div>
            <div style={{fontSize:13,color:"#64748b",marginBottom:24,lineHeight:1.6}}>{pinModal==="unlock"?"Enter your PIN to unlock the board.":"Choose a new PIN (min 4 digits)."}</div>
            <input type="password" value={pinInput} onChange={e=>{setPinInput(e.target.value);setPinError("");}}
              onKeyDown={e=>e.key==="Enter"&&handlePinSubmit()} placeholder="••••••" autoFocus
              style={{width:"100%",padding:"14px",borderRadius:12,border:`2px solid ${pinError?"#ef4444":"rgba(255,255,255,0.1)"}`,background:"#0f172a",color:"#f8fafc",fontSize:24,textAlign:"center",letterSpacing:"0.4em",marginBottom:pinError?8:20,outline:"none"}}/>
            {pinError&&<div style={{fontSize:12,color:"#ef4444",marginBottom:18,fontWeight:600}}>{pinError}</div>}
            <button onClick={handlePinSubmit} style={{width:"100%",padding:"14px",borderRadius:12,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",border:"none",fontWeight:900,fontSize:15,cursor:"pointer",marginBottom:10,boxShadow:"0 4px 20px rgba(99,102,241,0.4)"}}>
              {pinModal==="unlock"?"Unlock Board":"Save PIN"}
            </button>
            <button onClick={()=>{setPinModal(null);setPinInput("");setPinError("");}} style={{background:"none",border:"none",color:"#475569",fontSize:12,cursor:"pointer",fontWeight:600}}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
